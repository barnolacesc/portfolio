name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio-astro/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: portfolio-astro

      - name: Sync assets
        run: |
          mkdir -p portfolio-astro/public/assets
          cp assets/francesc_barnola_cv.pdf portfolio-astro/public/assets/francesc_barnola_cv.pdf || true

      - name: Build
        run: npm run build
        working-directory: portfolio-astro

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio-astro/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
